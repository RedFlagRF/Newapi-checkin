name: NewAPI 自动签到

on:
  # 定时执行：每天 3 次固定时间点触发（UTC 0/6/12 = 北京时间 8/14/20 点）。
  # GitHub Actions 的 cron 不支持 H() 随机语法（已实测报 invalid cron），
  # 改为每个锚点叠 0-5 分钟的短随机抖动，既能避免与其他 workflow 同时打挂站点，
  # 也防止容器长 sleep 被进程管理 kill。
  # 配合 checkin.py 的 should_run() / mark_complete()，今天已签到的账号会被跳过，
  # 所以多次重复执行是安全的（保险网，应对网络抖动、临时封控等）。
  schedule:
    - cron: '0 0 * * *'   # 北京时间 08:00
    - cron: '0 6 * * *'   # 北京时间 14:00
    - cron: '0 12 * * *'  # 北京时间 20:00
  # 手动触发（不延迟）
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: 短随机延迟（仅定时触发，0-300 秒避免与其他 workflow 撞车）
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 300))
          echo "延迟 ${DELAY} 秒"
          sleep ${DELAY}

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: playwright install chromium --with-deps

      - name: 恢复签到状态（data/ 目录缓存，跨运行去重今日已签到的账号）
        uses: actions/cache@v4
        with:
          path: data
          key: checkin-state-v1

      - name: 执行签到
        env:
          CONFIG_URL: ${{ secrets.CONFIG_URL }}
          CONFIG_AUTH: ${{ secrets.CONFIG_AUTH }}
          NEWAPI_ACCOUNTS: ${{ secrets.NEWAPI_ACCOUNTS }}
          PUSH_QMSG_KEY: ${{ secrets.PUSH_QMSG_KEY }}
          PUSH_PUSHPLUS_TOKEN: ${{ secrets.PUSH_PUSHPLUS_TOKEN }}
          PUSH_SERVER_KEY: ${{ secrets.PUSH_SERVER_KEY }}
          PUSH_WORK_WECHAT_ROBOT_KEY: ${{ secrets.PUSH_WORK_WECHAT_ROBOT_KEY }}
          PUSH_WORK_WECHAT_CORPID: ${{ secrets.PUSH_WORK_WECHAT_CORPID }}
          PUSH_WORK_WECHAT_CORP_SECRET: ${{ secrets.PUSH_WORK_WECHAT_CORP_SECRET }}
          PUSH_WORK_WECHAT_AGENT_ID: ${{ secrets.PUSH_WORK_WECHAT_AGENT_ID }}
        run: python checkin.py

      - name: 保存签到状态（仅定时触发，避免手动触发时回写浪费）
        if: github.event_name == 'schedule'
        uses: actions/cache@v4
        with:
          path: data
          key: checkin-state-v1
